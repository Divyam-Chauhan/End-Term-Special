<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrepMap End-Term Questions</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="PrepMap home">
          <span class="brand-mark" aria-hidden="true">PM</span>
          <span>
            <strong>PrepMap</strong>
            <small>End-Term Questions</small>
          </span>
        </a>

        <div class="subject-tabs" aria-label="Subject sections">
          <button class="tab-button is-active" type="button" data-subject="web-dev">Web Dev</button>
          <button class="tab-button" type="button" data-subject="dbms">DBMS</button>
          <button class="tab-button" type="button" data-subject="dsa-cpp">DSA C++</button>
        </div>
      </header>

      <main>
        <section class="study-toolbar" aria-labelledby="page-title">
          <div>
            <p class="eyebrow">Subject-wise prep map</p>
            <h1 id="page-title">End-term practice answers for high-scoring 8-mark questions.</h1>
          </div>

          <div class="toolbar-actions">
            <label class="search-box">
              <span class="visually-hidden">Search questions</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m16.5 16.5 4 4"></path>
              </svg>
              <input id="searchInput" type="search" placeholder="Search topic or keyword">
            </label>

            <button class="icon-button" type="button" id="printButton" aria-label="Print current section">
              <svg viewBox="0 0 24 24" aria-hidden="true">
